name: autover

on:
    pull_request:
        types: [opened, synchronize, reopened, labeled, unlabeled]
    push:
        branches: [main]
    workflow_dispatch:

permissions: {}

env:
    REQUIRED_LABEL: autover-apply
    CREATE_TAG: "false"

jobs:
    preview:
        if: ${{ github.event_name == 'pull_request' }}
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: read
            pull-requests: write
        steps:
            - uses: actions/checkout@v6
              with:
                  persist-credentials: false
            - uses: actions/setup-node@v6
              with:
                  node-version: "22"
                  cache: npm
            - name: Install dependencies
              run: npm ci
            - name: Run autover (dry-run)
              id: autover
              run: |
                  set -euo pipefail
                  set +e
                  line="$(node ./bin/autover.js --workspaces --guard-unchanged --no-amend --no-skip-ci --dry-run --short)"
                  status=$?
                  set -e
                  if [ "$status" -ne 0 ] && [ "$status" -ne 4 ]; then
                    exit "$status"
                  fi
                  echo "$line"
                  echo "summary=${line//'%'/'%25'}" >> "$GITHUB_OUTPUT"
            - name: Comment on PR with version summary
              uses: actions/github-script@v7
              with:
                  script: |
                      const summary = `${{ toJSON(steps.autover.outputs.summary) }}`.replace(/^"|"$/g, "");
                      const body = summary && summary.trim().length
                        ? `🧭 **autover** preview\n\n\`${summary}\``
                        : "🧭 **autover** preview\n\n_No changes or summary unavailable._";
                      await github.rest.issues.createComment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.issue.number,
                        body
                      });

    apply:
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]' }}
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: write
            pull-requests: write
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0
            - uses: actions/setup-node@v6
              with:
                  node-version: "22"
                  cache: npm
            - name: Install dependencies
              run: npm ci
            - name: Identify PR associated with this push
              id: pr
              uses: actions/github-script@v7
              with:
                  script: |
                      const sha = context.sha;
                      const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        commit_sha: sha,
                      });
                      if (!prs || prs.length === 0) {
                        core.setOutput('found', 'false');
                        return;
                      }
                      const pr = prs[0];
                      const labels = pr.labels?.map(l => (typeof l === 'string' ? l : l.name)) || [];
                      const required = process.env.REQUIRED_LABEL;
                      const hasRequired = labels.includes(required);
                      core.setOutput('found', 'true');
                      core.setOutput('number', pr.number.toString());
                      core.setOutput('has_required', hasRequired ? 'true' : 'false');

            - name: Configure Git author
              if: ${{ steps.pr.outputs.found == 'true' && steps.pr.outputs.has_required == 'true' }}
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            - name: Run autover (apply)
              if: ${{ steps.pr.outputs.found == 'true' && steps.pr.outputs.has_required == 'true' }}
              id: apply_autover
              run: |
                  set -euo pipefail
                  set +e
                  line="$(node ./bin/autover.js --workspaces --guard-unchanged --no-amend --no-skip-ci --short)"
                  status=$?
                  set -e
                  if [ "$status" -ne 0 ] && [ "$status" -ne 4 ]; then
                    exit "$status"
                  fi
                  echo "$line"
                  echo "summary=${line//'%'/'%25'}" >> "$GITHUB_OUTPUT"

            - name: Commit and push version files
              if: ${{ steps.pr.outputs.found == 'true' && steps.pr.outputs.has_required == 'true' }}
              run: |
                  if [ -z "$(git status --porcelain)" ]; then
                    echo "No version changes to commit."
                    exit 0
                  fi
                  git add -u
                  git commit -m "chore(version): update generated versions" -m "Autover-Version: true"
                  git push

            - name: Optionally create tag from autover output
              if: ${{ steps.pr.outputs.found == 'true' && steps.pr.outputs.has_required == 'true' && env.CREATE_TAG == 'true' }}
              run: |
                  set -euo pipefail
                  line="${{ steps.apply_autover.outputs.summary }}"
                  ver="$(echo "$line" | awk -F'|' '{gsub(/^ *| *$/,"",$2); print $2}')"
                  if [ -n "$ver" ] && [ "$ver" != "unchanged" ]; then
                    tag="v$(echo "$ver" | sed 's/[+-].*$//')"
                    if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
                      echo "Tag $tag already exists; skipping."
                    else
                      git tag "$tag"
                      git push origin "$tag"
                    fi
                  fi

            - name: Comment result on the source PR
              if: ${{ steps.pr.outputs.found == 'true' && steps.pr.outputs.has_required == 'true' }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const prNumber = Number(`${{ steps.pr.outputs.number || 0 }}`);
                      if (!prNumber) return;
                      const summary = `${{ toJSON(steps.apply_autover.outputs.summary) }}`.replace(/^"|"$/g, "");
                      const body = summary && summary.trim().length
                        ? `✅ **autover** applied on \`main\`\n\n\`${summary}\``
                        : "ℹ️ **autover** ran on `main` but produced no changes.";
                      await github.rest.issues.createComment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: prNumber,
                        body
                      });
