name: ci

on:
    pull_request:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    test:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        strategy:
            fail-fast: false
            matrix:
                node-version: ["20.19.0", "22", "24"]

        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  persist-credentials: false

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run format, lint, and tests
              run: npm run format:check && npm run lint && npm test

    docs:
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  persist-credentials: false

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: "22"
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build docs
              run: npm run docs
